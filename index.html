<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>時間拖延大師出門list</title>
    <style>
        :root { --primary-color: #4a90e2; --bg-color: #f5f7fa; --card-bg: #ffffff; --text-color: #333333; --done-color: #999999; --delete-color: #ff5252; --share-color: #2ecc71; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: var(--card-bg); padding: 25px 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); }
        h1 { font-size: 1.5rem; text-align: center; margin-bottom: 5px; color: #3a7bd5; }
        .status-text { text-align: center; font-size: 0.8rem; color: #777; margin-bottom: 15px; font-weight: bold; }
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input[type="text"] { flex: 1; padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1rem; outline: none; }
        input[type="text"]:focus { border-color: var(--primary-color); }
        button.add-btn { padding: 12px 20px; background-color: var(--primary-color); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; }
        .share-btn { width: 100%; padding: 14px; background-color: var(--share-color); color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-bottom: 20px; display: flex; justify-content: center; align-items: center; gap: 8px; box-shadow: 0 4px 10px rgba(46, 204, 113, 0.2); }
        .todo-list { list-style: none; }
        .todo-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 10px; border-bottom: 1px solid #f0f0f0; }
        .todo-item-left { display: flex; align-items: center; gap: 12px; flex: 1; cursor: pointer; }
        input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; accent-color: var(--primary-color); }
        .item-text { font-size: 1.1rem; word-break: break-all; }
        .completed .item-text { color: var(--done-color); text-decoration: line-through; }
        .delete-btn { background: none; border: none; color: var(--delete-color); font-size: 0.9rem; cursor: pointer; padding: 5px 8px; }
    </style>
</head>
<body>
<div class="container">
    <h1>🎒時間拖延大師出門list</h1>
    <div class="status-text" id="statusText">🔒 本地安全防護模式 (重整絕不丟失)</div>
    
    <button class="share-btn" id="shareBtn">🔗 複製同步連結給老公</button>

    <div class="input-group">
        <input type="text" id="itemInput" placeholder="輸入需要攜帶的物品...如：奶瓶" maxlength="30">
        <button class="add-btn" id="addBtn">新增</button>
    </div>
    <ul class="todo-list" id="todoList"></ul>
</div>
<script>
    const itemInput = document.getElementById('itemInput');
    const addBtn = document.getElementById('addBtn');
    const todoList = document.getElementById('todoList');
    const statusText = document.getElementById('statusText');
    const shareBtn = document.getElementById('shareBtn');
    
    const LOCAL_KEY = 'chuchu_perfect_local_list';
    let itemsArray = [];

    // 【核心步驟 1】：檢查網址裡有沒有另一半傳過來的暗號
    function urlDecodeData() {
        const urlParams = new URLSearchParams(window.location.search);
        const encodedData = urlParams.get('listData');
        if (encodedData) {
            try {
                // 解開加密字串
                const decodedText = decodeURIComponent(atob(encodedData));
                const parsed = JSON.parse(decodedText);
                if (Array.isArray(parsed)) {
                    itemsArray = parsed;
                    localStorage.setItem(LOCAL_KEY, JSON.stringify(itemsArray));
                    
                    // 把網址後面的髒尾巴洗掉，恢復乾淨網址
                    window.history.replaceState({}, document.title, window.location.pathname);
                    statusText.textContent = '✅ 已成功同步最新清單！';
                    setTimeout(() => { statusText.textContent = '🔒 本地安全防護模式 (重整絕不丟失)'; }, 3000);
                }
            } catch (e) {
                console.error("解碼失敗", e);
            }
        }
    }

    // 先執行網址解碼
    urlDecodeData();
    
    // 如果網址沒有傳新資料，就讀本機原本存的
    if (itemsArray.length === 0) {
        const saved = localStorage.getItem(LOCAL_KEY);
        if (saved) {
            try { itemsArray = JSON.parse(saved) || []; } catch(e) { itemsArray = []; }
        }
    }
    renderList();

    function saveToLocal() {
        localStorage.setItem(LOCAL_KEY, JSON.stringify(itemsArray));
    }

    function addItem() {
        const text = itemInput.value.trim();
        if (text === '') return;
        itemsArray.push({ id: Date.now(), text: text, completed: false });
        itemInput.value = '';
        saveToLocal();
        renderList();
    }

    function toggleItem(id) {
        itemsArray = itemsArray.map(item => item.id === id ? { ...item, completed: !item.completed } : item);
        saveToLocal();
        renderList();
    }

    function deleteItem(id) {
        itemsArray = itemsArray.filter(item => item.id !== id);
        saveToLocal();
        renderList();
    }

    function renderList() {
        todoList.innerHTML = '';
        itemsArray.forEach(item => {
            const li = document.createElement('li');
            li.className = `todo-item ${item.completed ? 'completed' : ''}`;
            const leftDiv = document.createElement('div');
            leftDiv.className = 'todo-item-left';
            leftDiv.onclick = () => toggleItem(item.id);
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.checked = item.completed;
            checkbox.onclick = (e) => e.stopPropagation();
            checkbox.onchange = () => toggleItem(item.id);
            const span = document.createElement('span');
            span.className = 'item-text';
            span.textContent = item.text;
            leftDiv.appendChild(checkbox);
            leftDiv.appendChild(span);
            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-btn';
            deleteBtn.textContent = '刪除';
            deleteBtn.onclick = (e) => { e.stopPropagation(); deleteItem(item.id); };
            li.appendChild(leftDiv);
            li.appendChild(deleteBtn);
            todoList.appendChild(li);
        });
    }

    // 【核心步驟 2】：點擊按鈕，打包資料變成連結複製起來
    shareBtn.addEventListener('click', () => {
        try {
            const jsonString = JSON.stringify(itemsArray);
            const encodedData = btoa(encodeURIComponent(jsonString));
            const shareUrl = `${window.location.origin}${window.location.pathname}?listData=${encodedData}`;
            
            navigator.clipboard.writeText(shareUrl).then(() => {
                const originalText = shareBtn.textContent;
                shareBtn.textContent = '✅ 複製成功！快傳給老公 LINE';
                shareBtn.style.backgroundColor = '#27ae60';
                setTimeout(() => {
                    shareBtn.textContent = originalText;
                    shareBtn.style.backgroundColor = '#2ecc71';
                }, 2500);
            }).catch(err => {
                alert('複製失敗，請直接手動複製您目前的瀏覽器網址傳給老公！');
            });
        } catch (e) {
            console.error(e);
        }
    });

    addBtn.addEventListener('click', addItem);
    itemInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addItem(); });
</script>
</body>
</html>
