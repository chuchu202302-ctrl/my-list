<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>時間拖延大師出門list</title>
    <style>
        :root { --primary-color: #4a90e2; --bg-color: #f5f7fa; --card-bg: #ffffff; --text-color: #333333; --done-color: #999999; --delete-color: #ff5252; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: var(--card-bg); padding: 25px 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); }
        h1 { font-size: 1.5rem; text-align: center; margin-bottom: 5px; color: #3a7bd5; }
        
        /* 🌟 全新亮眼狀態燈號 */
        .status-badge { text-align: center; font-size: 0.85rem; margin-bottom: 20px; padding: 8px; border-radius: 8px; font-weight: bold; transition: all 0.3s ease; background: #fff9db; color: #f59f00; }
        
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"] { flex: 1; padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1rem; outline: none; }
        input[type="text"]:focus { border-color: var(--primary-color); }
        button.add-btn { padding: 12px 20px; background-color: var(--primary-color); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; }
        .todo-list { list-style: none; }
        .todo-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 10px; border-bottom: 1px solid #f0f0f0; }
        .todo-item-left { display: flex; align-items: center; gap: 12px; flex: 1; cursor: pointer; }
        input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; accent-color: var(--primary-color); }
        .item-text { font-size: 1.1rem; word-break: break-all; }
        .completed .item-text { color: var(--done-color); text-decoration: line-through; }
        .delete-btn { background: none; border: none; color: var(--delete-color); font-size: 0.9rem; cursor: pointer; padding: 5px 8px; }
    </style>
</head>
<body>
<div class="container">
    <h1>🎒時間拖延大師出門list</h1>
    <div class="status-badge" id="statusBox">📡 正在啟動全自動同步引擎...</div>
    
    <div class="input-group">
        <input type="text" id="itemInput" placeholder="輸入需要攜帶的物品...如：奶瓶" maxlength="30">
        <button class="add-btn" id="addBtn">新增</button>
    </div>
    <ul class="todo-list" id="todoList"></ul>
</div>
<script>
    // 🌟 更換為 100% 支援前端跨網域（CORS）的 Pantry API
    const PANTRY_ID = '7f3c6d8a-2b1e-4590-a6c2-84d7e9b01f3a';
    const BASKET_NAME = 'chuchu_master_list_v2';
    const API_URL = `https://getpantry.cloud/apiv1/pantry/${PANTRY_ID}/basket/${BASKET_NAME}`;
    const LOCAL_KEY = 'chuchu_pantry_store';

    const itemInput = document.getElementById('itemInput');
    const addBtn = document.getElementById('addBtn');
    const todoList = document.getElementById('todoList');
    const statusBox = document.getElementById('statusBox');
    
    let localState = { items: [], ts: 0 }; 

    // 【核心防護 1】：一開網頁，0秒先抓本地記憶，保證同瀏覽器重整絕對有東西
    const saved = localStorage.getItem(LOCAL_KEY);
    if (saved) {
        try {
            const parsed = JSON.parse(saved);
            if (parsed && Array.isArray(parsed.items)) { localState = parsed; }
        } catch(e) { console.error(e); }
    }
    renderList();

    // 更新狀態燈號的工具
    function updateStatus(text, type) {
        statusBox.textContent = text;
        if (type === 'success') {
            statusBox.style.background = '#ebf7ee';
            statusBox.style.color = '#2ecc71';
        } else if (type === 'error') {
            statusBox.style.background = '#ffe3e3';
            statusBox.style.color = '#ff4b4b';
        } else {
            statusBox.style.background = '#fff9db';
            statusBox.style.color = '#f59f00';
        }
    }

    // 【核心防護 2】：全自動中央對時同步引擎
    async function autoSyncEngine() {
        try {
            const response = await fetch(API_URL);
            if (response.ok) {
                const cloudState = await response.json();
                if (cloudState && cloudState.ts) {
                    // 狀況 A：雲端比較新 -> 換瀏覽器或老公改了東西，立刻同步下來
                    if (cloudState.ts > localState.ts) {
                        localState = cloudState;
                        localStorage.setItem(LOCAL_KEY, JSON.stringify(localState));
                        renderList();
                        updateStatus('🟢 雙機已同步 (已從雲端更新)', 'success');
                    } 
                    // 狀況 B：本地比較新 -> 剛剛在手機有操作，送上雲端
                    else if (localState.ts > cloudState.ts) {
                        await pushToCloud();
                    } 
                    // 狀況 C：完全一致
                    else {
                        updateStatus('🟢 雙機已同步 (資料一致)', 'success');
                    }
                }
            } else if (response.status === 400 || response.status === 404) {
                // 雲端還沒有這個資料夾（初次建立），如果本地有東西就推上去
                if (localState.ts > 0) { await pushToCloud(); }
                else { updateStatus('🟡 雲端就緒 (等待新增第一個項目)', 'warning'); }
            } else {
                throw new Error('雲端回應異常');
            }
        } catch (error) {
            console.error('同步出錯：', error);
            updateStatus('🔴 同步暫停 (本地資料安全鎖定)', 'error');
        }
    }

    // 專屬安全上傳
    async function pushToCloud() {
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(localState)
            });
            if (response.ok) {
                updateStatus('🟢 雙機已同步 (已成功送達雲端)', 'success');
            } else {
                throw new Error('寫入失敗');
            }
        } catch (error) {
            console.error('上傳失敗：', error);
            updateStatus('🔴 同步暫停 (上傳失敗，鎖定本地)', 'error');
        }
    }

    function addItem() {
        const text = itemInput.value.trim();
        if (text === '') return;
        
        localState.items.push({ id: Date.now(), text: text, completed: false });
        localState.ts = Date.now(); 
        
        itemInput.value = '';
        localStorage.setItem(LOCAL_KEY, JSON.stringify(localState)); 
        renderList(); 
        pushToCloud(); 
    }

    function toggleItem(id) {
        localState.items = localState.items.map(item => item.id === id ? { ...item, completed: !item.completed } : item);
        localState.ts = Date.now();
        localStorage.setItem(LOCAL_KEY, JSON.stringify(localState));
        renderList();
        pushToCloud(); 
    }

    function deleteItem(id) {
        localState.items = localState.items.filter(item => item.id !== id);
        localState.ts = Date.now();
        localStorage.setItem(LOCAL_KEY, JSON.stringify(localState));
        renderList();
        pushToCloud(); 
    }

    function renderList() {
        todoList.innerHTML = '';
        localState.items.forEach(item => {
            const li = document.createElement('li');
            li.className = `todo-item ${item.completed ? 'completed' : ''}`;
            const leftDiv = document.createElement('div');
            leftDiv.className = 'todo-item-left';
            leftDiv.onclick = () => toggleItem(item.id);
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.checked = item.completed;
            checkbox.onclick = (e) => e.stopPropagation(); 
            checkbox.onchange = () => toggleItem(item.id);
            const span = document.createElement('span');
            span.className = 'item-text';
            span.textContent = item.text;
            leftDiv.appendChild(checkbox);
            leftDiv.appendChild(span);
            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-btn';
            deleteBtn.textContent = '刪除';
            deleteBtn.onclick = (e) => { e.stopPropagation(); deleteItem(item.id); };
            li.appendChild(leftDiv);
            li.appendChild(deleteBtn);
            todoList.appendChild(li);
        });
    }

    addBtn.addEventListener('click', addItem);
    itemInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addItem(); });
    
    // 一開啟就執行對時，之後每 5 秒背景自動巡邏同步
    autoSyncEngine();
    setInterval(autoSyncEngine, 5000);
</script>
</body>
</html>
